<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nintendo_NES - NOSTALGEEK</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #2c2c2c; /* Dark background to make models pop */
        }
        model-viewer {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <model-viewer 
        src="models/Nintendo_NES.glb" 
        alt="A 3D model of Nintendo_NES" 
        ar 
        auto-rotate 
        autoplay
        camera-controls 
        shadow-intensity="1">
    </model-viewer>
</body>
</html>
